site_name: K8s for 4 Days
site_description: 4일 완성 컨테이너 & 쿠버네티스 실습 가이드
site_url: "https://skilleat-labs.github.io/k8s-for-4days/"

theme:
  name: material
  language: ko
  font:
    text: Pretendard
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 다크 모드로 전환
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 라이트 모드로 전환
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

nav:
  - 홈: index.md
  - 1일차:
      - 1. VM 직접 구축하기: day1/1-1-vm-setup.md
      - 2. 컨테이너 실습: day1/1-2-container.md
      - 3. 스스로 하기 과제: day1/1-2-1-practice.md
      - 4. 레지스트리와 이미지 실습: day1/1-3-registry.md
      - 5. 나만의 이미지 만들고 ACR에 올리기: day1/1-3-1-acr.md
      - 6. 도커 네트워크 실습: day1/1-6-network.md
      - 7. 실습 환경 설치 (VS Code / Rancher / Docker Desktop): day1/1-env-setup.md
      - 8. kubectl 기본 명령어 & 클러스터 구조 탐색: day1/1-kubectl-basics.md
      - 9. 파드 실습: day1/2-1-pod.md
  - 2일차:
      - 1. ReplicaSet & Deployment 실습: day2/2-1-replicaset-deployment.md
      - 2. Service 실습 (ClusterIP · NodePort · port-forward): day2/2-2-service.md
      - 🔧 디버깅 도전 과제: day2/challenge-debug.md
      - 3. Namespace 실습: day2/2-4-namespace.md
      - 4. ConfigMap & Secret 실습: day2/2-3-configmap-secret.md
      - 5. Ingress 실습: day2/3-1-ingress.md
      - 6. Ingress TLS & Redirect 실습: day2/3-1-1-ingress-tls.md
  - 3일차:
      - 1. Gateway API 실습: day3/3-2-gateway.md
      - 2. 볼륨 실습 — emptyDir: day3/3-3-1-emptydir.md
      - 3. 볼륨 실습 — PV/PVC: day3/3-3-2-pv-pvc.md
      - 4. Liveness Probe 실습: day3/4-1-probe-liveness.md
      - 5. Readiness & Startup Probe 실습: day3/4-2-probe-readiness.md
      - 6. Resource Requests & Limits 실습: day3/4-3-resource-requests-limits.md
      - 7. Resource QoS 실습: day3/4-4-resource-qos.md
      - 🔧 도전 과제 — 미니 블로그 (Gateway API + PVC): day3/challenge-miniblog.md
  - 4일차:
      - 1. VirtualBox + 쿠버네티스 구축하기: day4/vbox-k8s-setup.md
      - 2. Private Registry — ACR 이미지 Pull Secret: day4/acr-pull-secret.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
